<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Bitcoin — BTC Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --btc:#F7931A; --btc-glow:rgba(247,147,26,0.55);
  --eth:#627EEA; --gold:#FFD700; --green:#00ff88; --red:#ff3355;
  --bg:#060610; --panel:rgba(8,8,28,0.92); --border:rgba(247,147,26,0.18);
  --ink:#e8edff; --ink-dim:#9baad2;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body {
  background:radial-gradient(1200px 700px at 50% -10%,rgba(247,147,26,0.07),transparent 60%),
    radial-gradient(900px 600px at 90% 110%,rgba(98,126,234,0.06),transparent 60%),var(--bg);
  background-attachment:fixed; color:var(--ink); font-family:'Rajdhani',sans-serif;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  overflow-x:hidden; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
}
body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
  pointer-events:none; z-index:9999;
}
.nav {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:0.75rem 2rem; background:rgba(6,6,22,0.88); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; flex-wrap:wrap; gap:0.5rem;
}
.nav-logo {
  font-family:'Orbitron',monospace; font-weight:900; font-size:1rem;
  color:var(--btc); text-decoration:none; text-shadow:0 0 12px var(--btc-glow); letter-spacing:.06em;
}
.nav-links { display:flex; gap:4px; flex-wrap:wrap; }
.nav-links a {
  font-family:'Orbitron',monospace; font-weight:700; font-size:.72rem;
  color:var(--ink-dim); text-decoration:none; padding:4px 9px; border-radius:7px;
  letter-spacing:.06em; transition:color .2s,background .2s;
}
.nav-links a:hover { color:var(--btc); background:rgba(247,147,26,0.08); }
.nav-links a.active { color:var(--btc); background:rgba(247,147,26,0.12); text-shadow:0 0 8px var(--btc-glow); }
.game-wrap {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:1rem 0.5rem; width:100%; max-width:480px; margin:0 auto;
}
.canvas-container {
  position:relative; width:100%; max-width:480px; aspect-ratio:960/1200;
  border:1px solid rgba(247,147,26,0.35); border-radius:14px;
  box-shadow:0 0 0 1px rgba(247,147,26,0.06),0 8px 40px rgba(0,0,0,0.8),
    0 0 55px rgba(247,147,26,0.18),inset 0 1px 0 rgba(247,147,26,0.08);
  overflow:hidden; user-select:none; -webkit-user-select:none;
}
canvas { display:block; width:100%; height:100%; image-rendering:auto; }
.overlay {
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at center,rgba(13,8,32,0.94) 0%,rgba(6,6,16,0.93) 100%);
  z-index:10; gap:0.65rem; padding:2rem; text-align:center;
}
.overlay.hidden { display:none; }
.overlay-title {
  font-family:'Orbitron',monospace; font-weight:900; font-size:2rem;
  background:linear-gradient(135deg,var(--gold),var(--btc),#fff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 18px var(--btc-glow)); line-height:1.1; letter-spacing:2px;
}
.overlay-sub { font-family:'Rajdhani',sans-serif; font-weight:600; font-size:1rem; color:var(--ink-dim); letter-spacing:1px; }
.overlay-best { font-family:'Orbitron',monospace; font-size:.85rem; color:var(--gold); letter-spacing:1px; text-shadow:0 0 10px rgba(255,215,0,.45); }
.tap-to-start {
  font-family:'Orbitron',monospace; font-weight:700; font-size:.9rem; color:var(--green);
  letter-spacing:2px; animation:blink .9s ease-in-out infinite; margin-top:.4rem; text-shadow:0 0 14px rgba(0,255,136,.5);
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.1;} }
.overlay-rekt {
  font-family:'Orbitron',monospace; font-weight:900; font-size:2.6rem; color:var(--red);
  text-shadow:0 0 22px rgba(255,51,85,0.8); letter-spacing:4px;
}
.overlay-medal { font-size:3rem; line-height:1; filter:drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
.overlay-score-label { font-family:'Orbitron',monospace; font-size:.6rem; color:var(--ink-dim); letter-spacing:.14em; text-transform:uppercase; }
.overlay-score-val { font-family:'Orbitron',monospace; font-weight:700; font-size:1.5rem; color:var(--gold); text-shadow:0 0 14px rgba(255,215,0,.5); }
.score-row { display:flex; gap:2rem; align-items:center; }
.score-col { display:flex; flex-direction:column; align-items:center; gap:.2rem; }
.flash { position:absolute; inset:0; background:rgba(255,51,85,0.55); z-index:20; pointer-events:none; opacity:0; transition:opacity .05s; }
.flash.active { opacity:1; }
.bounce-coin {
  width:60px; height:60px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#FFE066,#F7931A 60%,#a05500);
  display:flex; align-items:center; justify-content:center; font-size:1.7rem; font-weight:900;
  color:#7a3a00; box-shadow:0 0 22px var(--btc-glow),0 0 44px rgba(247,147,26,0.35);
  animation:bounce-anim .7s ease-in-out infinite alternate; margin:.4rem 0; font-family:'Orbitron',monospace;
}
@keyframes bounce-anim { from{transform:translateY(0);} to{transform:translateY(-20px);} }
.overlay-divider { width:140px; height:1px; background:linear-gradient(90deg,transparent,var(--btc),transparent); margin:.3rem 0; }
</style>
</head>

<div class="game-wrap">
  <div class="canvas-container" id="canvasContainer">
    <canvas id="gameCanvas" width="1920" height="2400"></canvas>
    <div class="flash" id="flashEl"></div>
    <div class="overlay" id="introOverlay">
      <div class="overlay-title">FLAPPY<br>BITCOIN</div>
      <div class="bounce-coin">₿</div>
      <div class="overlay-sub">Tap to flap &nbsp;•&nbsp; Collect ₿ &nbsp;•&nbsp; Dodge shitcoin pipes</div>
      <div class="overlay-divider"></div>
      <div class="overlay-best" id="introBest">BEST: 0</div>
      <div class="tap-to-start">▶ TAP TO START ◀</div>
    </div>
    <div class="overlay hidden" id="gameoverOverlay">
      <div style="font-size:2.2rem; line-height:1;">💥</div>
      <div class="overlay-rekt">REKT!</div>
      <div class="overlay-medal" id="medalEl"></div>
      <div class="score-row">
        <div class="score-col"><div class="overlay-score-label">Score</div><div class="overlay-score-val" id="goScore">0</div></div>
        <div class="score-col"><div class="overlay-score-label">Best</div><div class="overlay-score-val" id="goBest">0</div></div>
      </div>
      <div class="overlay-divider"></div>
      <div class="tap-to-start">TAP TO PLAY AGAIN</div>
    </div>
    <!-- pause overlay -->
    <div class="overlay hidden" id="flappyPauseOverlay" style="background:rgba(6,6,22,.82);backdrop-filter:blur(8px);">
      <div style="font-size:2.5rem;">⏸</div>
      <div class="overlay-title" style="font-size:clamp(1.2rem,4vw,1.8rem);">PAUSED</div>
      <div class="tap-to-start">TAP OR [ESC] TO RESUME</div>
    </div>
    <!-- pause button -->
    <button id="flappyPauseBtn" style="position:absolute;top:8px;right:8px;z-index:50;background:rgba(6,6,22,.75);border:1px solid rgba(247,147,26,.5);color:#F7931A;border-radius:7px;padding:5px 10px;font-size:.7rem;font-family:'Orbitron',monospace;cursor:pointer;letter-spacing:.04em;">⏸</button>
  </div>
</div>

<script src="ui.js"></script>
<script src="music.js"></script>
<script>
(function(){
'use strict';

// ─── SAFE SCORE MANAGER (replaces broken auth.js) ────────────────────────────
const ScoreManager = {
  get: (key) => { try { return parseInt(localStorage.getItem(key)) || 0; } catch(e) { return 0; } },
  set: (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} }
};

// ─── CANVAS & CTX ────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ─── DOM REFS ────────────────────────────────────────────────────────────────
const introOverlay   = document.getElementById('introOverlay');
const gameoverOverlay= document.getElementById('gameoverOverlay');
const flashEl        = document.getElementById('flashEl');
const introBest      = document.getElementById('introBest');
const goScore        = document.getElementById('goScore');
const goBest         = document.getElementById('goBest');
const medalEl        = document.getElementById('medalEl');

// ─── COLORS ──────────────────────────────────────────────────────────────────
const C = {
  btc: '#F7931A', btcGlow:'rgba(247,147,26,0.55)', eth:'#627EEA',
  gold:'#FFD700', green:'#00ff88', red:'#ff3355', bg:'#060610', pipe:'#0a1228'
};

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let state     = 'intro';
let score     = 0;
let hiScore   = ScoreManager.get('btc_flappy_hs');
let frameCount= 0;
let lastTime  = 0;
let deltaTime = 0;
let dtn       = 1;
let screenShake = 0;

// ─── BACKGROUND HEX GRID (built once to offscreen canvas) ──
const hexCanvas = document.createElement('canvas');
hexCanvas.width = W; hexCanvas.height = H;
(function buildHexGrid(){
  const hx = hexCanvas.getContext('2d');
  const side = 24;
  const hw = Math.sqrt(3) * side;
  const vSpace = side * 1.5;
  hx.strokeStyle = 'rgba(247,147,26,0.04)';
  hx.lineWidth = 1;
  for(let row=0, y=0; y < H + side; row++, y += vSpace){
    const xOff = (row % 2) ? hw/2 : 0;
    for(let x = -hw; x < W + hw; x += hw){
      const cx = x + xOff, cy = y;
      hx.beginPath();
      for(let i=0;i<6;i++){
        const a = Math.PI/180 * (60*i - 30);
        const px = cx + side*Math.cos(a), py = cy + side*Math.sin(a);
        i===0 ? hx.moveTo(px,py) : hx.lineTo(px,py);
      }
      hx.closePath();
      hx.stroke();
    }
  }
})();

// ─── DIFFICULTY ──────────────────────────────────────────────────────────────
let pipeSpeed    = 4.8;
let spawnInterval= 300;
let gapSize      = 520;
let lastDiffLevel= 0;
let spawnTimer   = 0;
let nextSpawnMs  = 220 * 16.667; // first pipe delay in ms

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const GRAVITY     = 1.1;
const FLAP_VEL    = -22;
const PLAYER_R    = 44;
const PLAYER_X    = 480;
let player = { x: PLAYER_X, y: 1200, vy: 0, angle: 0 };
let trail = [];

// ─── PIPES & FX ──────────────────────────────────────────────────────────────
let pipes      = [];
let particles  = [];
let floatTexts = [];

// ─── BG PARTICLES ────────────────────────────────────────────────────────────
let bgParticles = [];
for(let i=0;i<50;i++){
  bgParticles.push({
    x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3,
    vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
    color: Math.random()<0.6 ? 'rgba(247,147,26,' : 'rgba(98,126,234,',
    col: Math.random()<0.6 ? '#F7931A' : '#627EEA',
    alpha: Math.random()*0.25+0.05
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t){ return a + (b-a)*t; }
function spawnParticles(x, y, count, color){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*4+1;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 1, life: 1, maxLife: 1, color, r: Math.random()*4+2 });
  }
}
function spawnFloatText(x, y, text, color){
  floatTexts.push({ x, y, vy: -1.2, life:1, maxLife:1, text, color });
}

function spawnRing(x, y, color){
  particles.push({ type:'ring', x, y, r:8, maxR:45, life:0, maxLife:320, color });
}


function triggerFlash(){
  flashEl.classList.add('active');
  setTimeout(()=> flashEl.classList.remove('active'), 160);
}
function getMedal(s){
  if(s > 30) return '🥇'; if(s > 20) return '🥈'; if(s > 10) return '🥉'; if(s > 5) return '🏅'; return '';
}

// ─── RESET / INIT ─────────────────────────────────────────────────────────────
function resetGame(){
  player   = { x: PLAYER_X, y: 1000, vy: 0, angle: 0 };
  trail    = []; pipes = []; particles = []; floatTexts = [];
  score    = 0; frameCount = 0; spawnTimer = 0; nextSpawnMs = 220 * 16.667;
  pipeSpeed = 4.8; spawnInterval = 300; gapSize = 520; lastDiffLevel = 0;
}

// ─── PIPE SPAWNING ────────────────────────────────────────────────────────────
function spawnPipe(){
  if(pipes.length >= 2) return;
  const minGapY = 200;
  const maxGapY = H - gapSize - 200;
  const gapY    = Math.floor(Math.random()*(maxGapY - minGapY + 1)) + minGapY;
  pipes.push({ x: W + 60, gapY, passed: false, bonusCoin: { collected: false, y: gapY + gapSize/2, pulse: 0 } });
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
const PIPE_W = 240;
const LENIENCY = 8;
function circleRect(cx, cy, cr, rx, ry, rw, rh){
  const nearX = clamp(cx, rx, rx+rw);
  const nearY = clamp(cy, ry, ry+rh);
  const dx = cx - nearX;
  const dy = cy - nearY;
  return dx*dx + dy*dy < (cr - LENIENCY)*(cr - LENIENCY);
}
function checkCollision(){
  if(player.y - PLAYER_R*0.82 < 0 || player.y + PLAYER_R*0.82 > H) return true;
  for(const p of pipes){
    const pipeX = p.x - PIPE_W/2;
    if(circleRect(player.x, player.y, PLAYER_R*0.82, pipeX, 0, PIPE_W, p.gapY)) return true;
    if(circleRect(player.x, player.y, PLAYER_R*0.82, pipeX, p.gapY + gapSize, PIPE_W, H - (p.gapY + gapSize))) return true;
  }
  return false;
}

// ─── DRAW HELPERS ─────────────────────────────────────────────────────────────
function drawBgParticles(){
  const t = frameCount * 0.003; // frame-based timing (replaces Date.now())
  const buildingsBack = [{w:60,h:160},{w:40,h:220},{w:80,h:140},{w:50,h:240},{w:70,h:180},{w:30,h:200},{w:90,h:120},{w:56,h:260},{w:44,h:190},{w:76,h:150},{w:64,h:170},{w:36,h:230},{w:84,h:130},{w:52,h:210},{w:72,h:160},{w:40,h:180},{w:60,h:140},{w:80,h:200}];
  const buildingsFront = [{w:100,h:280},{w:70,h:360},{w:120,h:240},{w:80,h:400},{w:110,h:320},{w:90,h:220},{w:130,h:300},{w:60,h:380},{w:100,h:260},{w:84,h:340},{w:116,h:290},{w:76,h:330}];
  
  const scrollBack = (t * 16000) % 1200;
  let xB = -scrollBack;
  buildingsBack.forEach((b, i) => {
    while(xB < W + b.w) {
      ctx.fillStyle = 'rgba(8,12,40,0.85)';
      ctx.fillRect(xB, H - b.h - 120, b.w - 2, b.h);
      if(b.h > 120) {
        for(let wy = H - b.h - 100; wy < H - 130; wy += 28) {
          for(let wx = xB + 8; wx < xB + b.w - 16; wx += 20) {
            if(Math.sin(wx*0.7 + wy*0.3 + i) > 0.3) {
              ctx.fillStyle = `rgba(255,220,120,${0.08 + Math.sin(wx+wy+t*200)*0.04})`;
              ctx.fillRect(wx, wy, 10, 8);
            }
          }
        }
      }
      xB += b.w + 8;
    }
    xB -= 1200 + scrollBack;
  });

  const scrollFront = (t * 40000) % 1600;
  let xF = -scrollFront;
  buildingsFront.forEach((b, i) => {
    while(xF < W + b.w) {
      ctx.fillStyle = 'rgba(4,6,20,0.95)';
      ctx.fillRect(xF, H - b.h - 120, b.w - 2, b.h);
      for(let wy = H - b.h - 100; wy < H - 130; wy += 32) {
        for(let wx = xF + 10; wx < xF + b.w - 16; wx += 24) {
          if(Math.sin(wx*0.5 + wy*0.4 + i*2) > 0.2) {
            const lit = Math.sin(wx*1.3 + wy + t*500 + i) > 0.6;
            ctx.fillStyle = lit ? `rgba(100,180,255,0.25)` : `rgba(255,180,80,0.15)`;
            ctx.fillRect(wx, wy, 12, 10);
          }
        }
      }
      xF += b.w + 12;
    }
    xF -= 1600 + scrollFront;
  });

  bgParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x < 0) p.x = W; if(p.x > W) p.x = 0;
    if(p.y < 0) p.y = H; if(p.y > H) p.y = 0;
    if(p.y < H * 0.55) {
      ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.col;
      ctx.shadowColor = p.col; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
  });
}

function drawPipe(p){
  const pipeX = p.x - PIPE_W/2;

  // Enhanced ETH glow on pipes
  ctx.save();
  ctx.shadowColor = '#627EEA';
  ctx.shadowBlur  = 12;


  drawPipeRect(pipeX, 0, PIPE_W, p.gapY, true);
  const bpY = p.gapY + gapSize;
  drawPipeRect(pipeX, bpY, PIPE_W, H - bpY, false);
  ctx.restore();


  ctx.save();
  const glowGrad = ctx.createLinearGradient(pipeX, p.gapY-3, pipeX, p.gapY+3);
  glowGrad.addColorStop(0, 'rgba(98,126,234,0.5)'); glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad; ctx.fillRect(pipeX, p.gapY-2, PIPE_W, 4);
  const glowGrad2 = ctx.createLinearGradient(pipeX, bpY-3, pipeX, bpY+3);
  glowGrad2.addColorStop(0, 'transparent'); glowGrad2.addColorStop(1, 'rgba(98,126,234,0.5)');
  ctx.fillStyle = glowGrad2; ctx.fillRect(pipeX, bpY-2, PIPE_W, 4); ctx.restore();
}

function drawPipeRect(x, y, w, h, isTop) {
  if(h <= 0) return;
  const g = ctx.createLinearGradient(x, 0, x+w, 0);
  g.addColorStop(0,'#050c20'); g.addColorStop(0.15,'#0d1830'); g.addColorStop(0.5,'#122040');
  g.addColorStop(0.85,'#0d1830'); g.addColorStop(1,'#050c20');
  ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
  const innerG = ctx.createLinearGradient(x, 0, x+w, 0);
  innerG.addColorStop(0,'rgba(98,126,234,0.0)'); innerG.addColorStop(0.3,'rgba(98,126,234,0.04)');
  innerG.addColorStop(0.5,'rgba(98,126,234,0.08)'); innerG.addColorStop(0.7,'rgba(98,126,234,0.04)');
  innerG.addColorStop(1,'rgba(98,126,234,0.0)');
  ctx.fillStyle = innerG; ctx.fillRect(x+4, y+4, w-8, h-8);
  ctx.strokeStyle = 'rgba(98,126,234,0.35)'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(98,126,234,0.12)'; ctx.lineWidth = 1;
  for(let py2 = y + 20; py2 < y + h - 10; py2 += 40) { ctx.beginPath(); ctx.moveTo(x+4, py2); ctx.lineTo(x+w-4, py2); ctx.stroke(); }
  const lightSpacing = 40;
  for(let py2 = y + 15; py2 < y + h - 10; py2 += lightSpacing) {
    const lit = Math.sin(frameCount*0.05 + py2) > 0.5;
    ctx.fillStyle = lit ? 'rgba(98,126,234,0.6)' : 'rgba(98,126,234,0.2)';
    ctx.beginPath(); ctx.arc(x + w/2, py2, 2.5, 0, Math.PI*2); ctx.fill();
  }
  const capH = 34, capW = w + 64, capX = x - 32;
  const capY = isTop ? y + h - capH : y;
  const capG = ctx.createLinearGradient(capX, 0, capX+capW, 0);
  capG.addColorStop(0,'#081428'); capG.addColorStop(0.5,'#122040'); capG.addColorStop(1,'#081428');
  ctx.fillStyle = capG; ctx.fillRect(capX, capY, capW, capH);
  ctx.strokeStyle = 'rgba(98,126,234,0.5)'; ctx.lineWidth = 2; ctx.strokeRect(capX, capY, capW, capH);
  ctx.fillStyle = 'rgba(98,126,234,0.15)'; ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for(let sy = y + 20; sy < y + h - 20; sy += 40) ctx.fillText('Ξ', x + w/2, sy);
}

function drawBonusCoin(p){
  const bc = p.bonusCoin; if(bc.collected) return;
  bc.pulse += 0.08;
  const pulseFactor = 1 + 0.15*Math.sin(bc.pulse);
  const cr = 16 * pulseFactor; const cx = p.x; const cy = bc.y;
  ctx.save(); ctx.shadowColor = C.gold; ctx.shadowBlur = 20;
  const grad = ctx.createRadialGradient(cx-cr*0.25, cy-cr*0.25, 0, cx, cy, cr);
  grad.addColorStop(0,'#fff4aa'); grad.addColorStop(0.5,C.gold); grad.addColorStop(1,'#a06000');
  ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = 'rgba(100,50,0,0.85)'; ctx.font = `bold ${Math.round(cr*1.1)}px Orbitron, monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('₿', cx, cy+0.5); ctx.restore();
}

function drawPlayer(){
  const { x, y, vy, angle } = player;
  ctx.save();
  for(let i=0;i<trail.length;i++){
    const t = trail[i]; const alpha = (1 - i/trail.length) * 0.3;
    const r = PLAYER_R * (1 - i/trail.length * 0.4);
    ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(247,147,26,${alpha})`; ctx.shadowColor = C.btc; ctx.shadowBlur = 8; ctx.fill();
  }
  ctx.restore();
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
  ctx.shadowColor = C.btc; ctx.shadowBlur = 30;
  ctx.beginPath(); ctx.arc(0, 0, PLAYER_R + 4, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(247,147,26,0.15)'; ctx.fill();
  const grad = ctx.createRadialGradient(-PLAYER_R*0.25, -PLAYER_R*0.35, 0, 0, 0, PLAYER_R);
  grad.addColorStop(0,'#FFF0A0'); grad.addColorStop(0.25,'#FFE566'); grad.addColorStop(0.55,C.gold);
  grad.addColorStop(0.8,C.btc); grad.addColorStop(1,'#7a4000');
  ctx.beginPath(); ctx.arc(0, 0, PLAYER_R, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath(); ctx.arc(0, 0, PLAYER_R - 4, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,230,100,0.4)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.strokeStyle = 'rgba(255,230,100,0.7)'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(80,35,0,0.9)';
  ctx.font = `bold ${Math.round(PLAYER_R * 1.55)}px Orbitron, monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('₿', 0, 2); ctx.restore();
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    if(p.type === 'ring'){
      p.life += 16;
      if(p.life >= p.maxLife){ particles.splice(i,1); continue; }
      const prog = p.life / p.maxLife;
      const rr = p.r + (p.maxR - p.r) * prog;
      ctx.save();
      ctx.globalAlpha = 1 - prog;
      ctx.strokeStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 10;
      ctx.lineWidth   = 2.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, rr, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
      continue;
    }
    p.x += p.vx*dtn; p.y += p.vy*dtn; p.vy += 0.12*dtn; p.life -= 0.035*dtn;
    if(p.life <= 0){ particles.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha = p.life; ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fillStyle = p.color; ctx.fill(); ctx.restore();
  }
}

function drawFloatTexts(){
  for(let i=floatTexts.length-1;i>=0;i--){
    const t = floatTexts[i]; t.y += t.vy*dtn; t.life -= 0.02*dtn;
    if(t.life <= 0){ floatTexts.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha = t.life; ctx.font = 'bold 80px Orbitron, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = t.color;
    ctx.shadowColor = t.color; ctx.shadowBlur = 8; ctx.fillText(t.text, t.x, t.y); ctx.restore();
  }
}

function drawHUD(){
  ctx.save(); ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold 130px Orbitron, monospace'; ctx.fillStyle = '#ffffff';
  ctx.shadowColor = C.btc; ctx.shadowBlur = 28; ctx.fillText(score, W/2, 36);
  ctx.font = '700 48px Orbitron, monospace'; ctx.fillStyle = 'rgba(255,215,0,0.8)';
  ctx.shadowBlur = 12; ctx.fillText('BEST ' + hiScore, W/2, 120); ctx.restore();
}

function drawGround(){
  const gY = H - 60;
  const gg = ctx.createLinearGradient(0, gY, 0, H);
  gg.addColorStop(0,'rgba(10,15,30,0.95)'); gg.addColorStop(0.3,'rgba(6,8,18,0.98)'); gg.addColorStop(1,'rgba(3,4,10,1)');
  ctx.fillStyle = gg; ctx.fillRect(0, gY, W, H - gY);
  const pulse = 0.6 + 0.4 * Math.sin(frameCount * 0.05);
  ctx.save(); ctx.shadowColor = '#F7931A'; ctx.shadowBlur = 12 * pulse;
  ctx.strokeStyle = `rgba(247,147,26,${0.5 + 0.3*pulse})`; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, gY); ctx.lineTo(W, gY); ctx.stroke();
  const scrollOffset = (frameCount * 0.8) % 40;
  ctx.strokeStyle = 'rgba(247,147,26,0.08)'; ctx.lineWidth = 1; ctx.shadowBlur = 0;
  for(let gx = -scrollOffset; gx < W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, gY); ctx.lineTo(gx + 20, H); ctx.stroke(); }
  for(let gy = gY + 15; gy < H; gy += 15) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
  ctx.restore();
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function update(dt){
  if(state !== 'playing') return;
  dtn = dt / 16.667;
  frameCount++;
  const diffLevel = Math.floor(score / 5);
  if(diffLevel > lastDiffLevel){
    const steps = diffLevel - lastDiffLevel;
    pipeSpeed     = Math.min(11.0, pipeSpeed + 0.25 * steps);
    spawnInterval = Math.max(180, spawnInterval - 2 * steps);
    gapSize       = Math.max(340, gapSize - 8 * steps);
    lastDiffLevel = diffLevel;
  }
  spawnTimer += dt;
  if(spawnTimer >= nextSpawnMs){ spawnPipe(); nextSpawnMs = spawnInterval * 16.667; spawnTimer = 0; }
  player.vy += GRAVITY * dtn;
  if(player.vy > 28) player.vy = 28;
  player.y  += player.vy * dtn;
  const targetAngle = clamp(player.vy * 0.055, -0.45, 1.0);
  player.angle = lerp(player.angle, targetAngle, 0.18);
  trail.unshift({ x: player.x, y: player.y });
  if(trail.length > 5) trail.pop();
  for(let i=pipes.length-1;i>=0;i--){
    const p = pipes[i]; p.x -= pipeSpeed * dtn;
    if(!p.passed && p.x + PIPE_W/2 < player.x){ p.passed = true; score++; }
    if(!p.bonusCoin.collected){
      const dx = player.x - p.x; const dy = player.y - p.bonusCoin.y;
      if(dx*dx + dy*dy < (PLAYER_R + 20)*(PLAYER_R + 20)){
        p.bonusCoin.collected = true; score += 5;
        spawnParticles(p.x, p.bonusCoin.y, 16, C.gold);
        spawnRing(p.x, p.bonusCoin.y, '#FFD700');
        spawnFloatText(p.x, p.bonusCoin.y - 20, '+5', C.gold);
      }
    }
    if(p.x < -80) pipes.splice(i, 1);
  }
  if(checkCollision()){ killPlayer(); return; }
  if(score > hiScore){ hiScore = score; ScoreManager.set('btc_flappy_hs', hiScore); }
}

// ─── SPEED LINES ──────────────────────────────────────────────────────────────
function drawSpeedLines(){
  if(pipeSpeed <= 3.5) return;
  const alpha = (pipeSpeed - 3.5) / 2.5 * 0.25;
  const count = 8 + Math.floor(((pipeSpeed - 3.5) / 2.5) * 4); // 8-12
  ctx.save();
  ctx.lineWidth = 1.5;
  for(let i=0;i<count;i++){
    // Pseudo-random but animated streaks moving left
    const seed = i * 137.5;
    const len = 30 + ((Math.sin(seed) + 1) * 0.5) * 80;
    const y = ((Math.sin(seed*1.7) + 1) * 0.5) * H;
    const baseX = (Math.sin(seed*0.9) + 1) * 0.5 * W;
    const x = (baseX - (frameCount * pipeSpeed * 1.5) % (W + 120)) ;
    const a = alpha * (0.4 + ((Math.sin(seed*2.3) + 1) * 0.5) * 0.6);
    ctx.strokeStyle = `rgba(247,147,26,${a})`;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + len, y);
    ctx.stroke();
  }
  ctx.restore();
}

function render(){
  ctx.save();
  if(screenShake > 0.5){
    ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
    screenShake *= 0.85;
  } else {
    screenShake = 0;
  }
  ctx.fillStyle = C.bg;
  ctx.fillRect(-20, -20, W+40, H+40);
  ctx.drawImage(hexCanvas, 0, 0);
  drawBgParticles();
  drawSpeedLines();
  for(const p of pipes){ drawPipe(p); drawBonusCoin(p); }
  drawGround();
  if(state === 'playing' || state === 'dead') drawPlayer();
  drawParticles(); drawFloatTexts();
  if(state === 'playing') drawHUD();
  ctx.restore();
}

function gameLoop(timestamp){
  deltaTime = timestamp - lastTime;
  lastTime = timestamp;
  if(deltaTime > 100) deltaTime = 100; // prevent physics explosion on tab-switch
  update(deltaTime); render();
  requestAnimationFrame(gameLoop);
}

// ─── DEATH ────────────────────────────────────────────────────────────────────
function killPlayer(){
  state = 'dead';
  if(score > hiScore){ hiScore = score; ScoreManager.set('btc_flappy_hs', hiScore); }
  triggerFlash();
  screenShake = 14;
  spawnParticles(player.x, player.y, 24, C.btc);
  setTimeout(()=>{
    goScore.textContent = score; goBest.textContent = hiScore;
    medalEl.textContent = getMedal(score);
    gameoverOverlay.classList.remove('hidden');
  }, 600);
}

// ─── UNIFIED INPUT HANDLER ───────────────────────────────────────────────────
let prevState = 'intro';
function togglePause(){
  if(state === 'playing'){ prevState = state; state = 'paused'; document.getElementById('flappyPauseOverlay').classList.remove('hidden'); }
  else if(state === 'paused'){ state = prevState; document.getElementById('flappyPauseOverlay').classList.add('hidden'); }
}
function handleInput(){
  if(state === 'paused'){ togglePause(); return; }
  if(state === 'intro'){
    introOverlay.classList.add('hidden'); resetGame(); state = 'playing'; player.vy = FLAP_VEL;
  } else if(state === 'playing'){
    player.vy = FLAP_VEL;
  } else if(state === 'dead'){
    gameoverOverlay.classList.add('hidden'); resetGame(); state = 'playing'; player.vy = FLAP_VEL;
  }
}

document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape' || e.key === 'p' || e.key === 'P'){ if(state==='playing'||state==='paused') togglePause(); return; }
  if(e.code === 'Space'){ e.preventDefault(); handleInput(); }
});
document.getElementById('flappyPauseBtn').addEventListener('click', () => { if(state==='playing'||state==='paused') togglePause(); });

const gameArea = document.querySelector('.canvas-container');
gameArea.addEventListener('pointerdown', (e)=>{
  e.preventDefault(); handleInput();
}, { passive: false });

gameArea.addEventListener('touchmove', (e)=> e.preventDefault(), { passive: false });
gameArea.addEventListener('gesturestart', (e)=> e.preventDefault(), { passive: false });
gameArea.addEventListener('gesturechange', (e)=> e.preventDefault(), { passive: false });

// ─── INIT ─────────────────────────────────────────────────────────────────────
introBest.textContent = 'BEST: ' + hiScore;
state = 'intro';
requestAnimationFrame(gameLoop);

})();
</script>
</body>
