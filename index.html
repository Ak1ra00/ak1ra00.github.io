<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Pac-Man Chase - Crypto Maze Game</title>
    <meta name="description" content="Catch the Bitcoin coins in this Pac-Man style maze chase game!">
    <meta name="theme-color" content="#F7931A">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }
        
        .game-container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
        }
        
        .game-section {
            flex: 1;
            min-width: 0;
        }
        
        .game-title {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .game-title h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #F7931A, #FFD700, #F7931A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .game-title p {
            color: #9ca3af;
            font-size: 1rem;
        }
        
        .game-canvas {
            background: #0a0a0a;
            border: 3px solid #374151;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(247, 147, 26, 0.2);
            display: block;
            margin: 0 auto;
        }
        
        .score-board {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(247, 147, 26, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .score-label {
            color: #9ca3af;
            font-weight: 500;
        }
        
        .score-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #F7931A;
        }
        
        .score-value.multiplier {
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .multiplier-display {
            background: linear-gradient(90deg, #374151, #1F2937);
            padding: 8px 16px;
            border-radius: 8px;
            text-align: center;
            margin-top: 10px;
        }
        
        .multiplier-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #F7931A, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .multiplier-label {
            color: #9ca3af;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .controls-info {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(247, 147, 26, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .controls-info h3 {
            color: #F7931A;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .control-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 200px;
            margin: 15px auto;
        }
        
        .control-btn {
            background: rgba(247, 147, 26, 0.15);
            border: 2px solid #F7931A;
            border-radius: 12px;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F7931A;
        }
        
        .control-btn:hover {
            background: rgba(247, 147, 26, 0.25);
            transform: scale(1.1);
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        .game-status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
            font-size: 1rem;
        }
        
        .status-active {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #10b981;
        }
        
        .status-multiplier {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid #FFD700;
            color: #FFD700;
        }
        
        .status-score {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid #00d4ff;
            color: #00d4ff;
        }
        
        .game-over {
            text-align: center;
            padding: 20px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            border-radius: 12px;
            margin-top: 15px;
            color: #ef4444;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #10b981, #06d6a0);
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }
        
        .speed-meter {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(247, 147, 26, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
        }
        
        .speed-bar {
            height: 8px;
            background: linear-gradient(90deg, #374151, #1F2937);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .speed-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #F7931A, #ef4444);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }
        
        .coin-counter {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #9ca3af;
        }
        
        .coin-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        @media (max-width: 1024px) {
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            .game-title h1 {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 768px) {
            .game-container {
                padding: 10px;
                gap: 10px;
            }
            
            .game-title h1 {
                font-size: 1.5rem;
            }
            
            .score-item {
                font-size: 0.9rem;
            }
            
            .score-value {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Left Section: Game Canvas -->
        <div class="game-section">
            <div class="game-title">
                <h1>🪙 Bitcoin Pac-Man Chase</h1>
                <p>Use arrow keys or on-screen controls to catch Bitcoin coins!</p>
            </div>
            
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <!-- Game Over Overlay -->
            <div id="gameOver" class="game-over" style="display: none;">
                <h2 style="color: #ef4444; margin-bottom: 10px;">Game Over!</h2>
                <p style="color: #9ca3af; margin-bottom: 5px;">Final Score</p>
                <p id="finalScore" style="font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 15px;">0</p>
                <button class="restart-btn" onclick="game.restart()">🔄 Play Again</button>
            </div>
        </div>
        
        <!-- Right Section: Stats & Controls -->
        <div class="game-section">
            <div class="score-board">
                <div class="score-item">
                    <span class="score-label">Score</span>
                    <span class="score-value" id="scoreDisplay">0</span>
                </div>
                
                <div class="multiplier-display">
                    <div class="multiplier-value" id="multiplierDisplay">x1</div>
                    <div class="multiplier-label">Multiplier</div>
                </div>
                
                <div class="speed-meter">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>Game Speed</span>
                        <span id="speedValue">100%</span>
                    </div>
                    <div class="speed-bar">
                        <div class="speed-fill" id="speedFill" style="width: 0%;"></div>
                    </div>
                </div>
                
                <div class="coin-counter">
                    <span>Total Coins Collected:</span>
                    <span class="coin-value" id="coinCounter">0</span>
                </div>
            </div>
            
            <!-- Mobile Controls -->
            <div class="controls-info">
                <h3>🎮 Controls</h3>
                <div class="control-buttons">
                    <div></div>
                    <button class="control-btn" onclick="game.movePlayer(0, -1)">⬆️</button>
                    <div></div>
                    <button class="control-btn" onclick="game.movePlayer(-1, 0)">⬅️</button>
                    <button class="control-btn" onclick="game.movePlayer(0, 1)">⬇️</button>
                    <button class="control-btn" onclick="game.movePlayer(1, 0)">➡️</button>
                </div>
                <p style="color: #9ca3af; text-align: center; font-size: 0.85rem;">
                    Desktop: Arrow Keys • Mobile: Touch buttons
                </p>
            </div>
            
            <div id="gameStatus" class="game-status status-active">
                🎮 Game Active - Catch the Bitcoin!
            </div>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game configuration
        const CELL_SIZE = 20;
        const COLS = 40;
        const ROWS = 30;
        
        // Game state
        const game = {
            active: true,
            score: 0,
            coinsCollected: 0,
            level: 1,
            multiplier: 1,
            speed: 1000,
            lastTime: 0,
            player: { x: 19, y: 14 },
            target: { x: 0, y: 0, dx: 0, dy: 0 },
            coins: [],
            maze: [],
            walls: [],
            wallsCount: 0,
            coinsInPlay: 1,
            
            // Initialize game
            init: function() {
                this.active = true;
                this.score = 0;
                this.coinsCollected = 0;
                this.level = 1;
                this.multiplier = 1;
                this.speed = 1000;
                this.coinsInPlay = 1;
                this.player.x = 19;
                this.player.y = 14;
                this.generateMaze();
                this.spawnBitcoin();
                this.updateScore();
                this.updateSpeed();
            },
            
            generateMaze: function() {
                // Create a simple maze with walls
                this.walls = [];
                this.wallsCount = 0;
                
                // Create maze pattern (simplified for performance)
                for (let y = 0; y < ROWS; y++) {
                    for (let x = 0; x < COLS; x++) {
                        // Border walls
                        if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1) {
                            this.walls.push({ x, y });
                        }
                    }
                }
                
                // Internal walls for maze structure
                for (let y = 0; y < ROWS; y += 4) {
                    for (let x = 2; x < COLS - 2; x += 3) {
                        this.walls.push({ x, y });
                    }
                }
                
                for (let x = 2; x < COLS - 2; x += 3) {
                    for (let y = 2; y < ROWS - 2; y += 3) {
                        this.walls.push({ x, y });
                    }
                }
                
                this.wallsCount = this.walls.length;
            },
            
            spawnBitcoin: function() {
                // Find empty position for Bitcoin
                const emptyCells = [];
                for (let y = 0; y < ROWS; y++) {
                    for (let x = 0; x < COLS; x++) {
                        const wall = this.walls.find(w => w.x === x && w.y === y);
                        if (!wall) {
                            emptyCells.push({ x, y });
                        }
                    }
                }
                
                // Pick random empty cell far from player
                const available = emptyCells.filter(cell => {
                    const dist = Math.abs(cell.x - this.player.x) + Math.abs(cell.y - this.player.y);
                    return dist > 10;
                });
                
                if (available.length > 0) {
                    const pos = available[Math.floor(Math.random() * available.length)];
                    this.target.x = pos.x;
                    this.target.y = pos.y;
                    this.target.dx = Math.random() > 0.5 ? 1 : -1;
                    this.target.dy = Math.random() > 0.5 ? 1 : -1;
                }
            },
            
            movePlayer: function(dx, dy) {
                if (!this.active) return;
                
                const newX = this.player.x + dx;
                const newY = this.player.y + dy;
                
                // Check if new position is valid (not a wall)
                const newWall = this.walls.find(w => w.x === newX && w.y === newY);
                if (!newWall) {
                    this.player.x = newX;
                    this.player.y = newY;
                }
            },
            
            update: function(deltaTime) {
                if (!this.active) return;
                
                // Update Bitcoin movement
                let newX = this.target.x + this.target.dx;
                let newY = this.target.y + this.target.dy;
                
                // Handle edge bouncing
                if (newX < 0 || newX >= COLS - 1) {
                    this.target.dx *= -1;
                    newX = Math.max(0, Math.min(COLS - 2, newX));
                }
                if (newY < 0 || newY >= ROWS - 1) {
                    this.target.dy *= -1;
                    newY = Math.max(0, Math.min(ROWS - 2, newY));
                }
                
                // Check wall collision
                const wall = this.walls.find(w => w.x === newX && w.y === newY);
                if (!wall) {
                    this.target.x = newX;
                    this.target.y = newY;
                }
                
                // Check collision with player
                if (this.player.x === this.target.x && this.player.y === this.target.y) {
                    this.catchBitcoin();
                }
            },
            
            catchBitcoin: function() {
                this.score += 100 * this.multiplier;
                this.coinsCollected++;
                this.coinsInPlay++;
                this.multiplier = Math.min(this.coinsInPlay, 32); // Max multiplier 32
                
                // Update score display
                this.updateScore();
                
                // Spawn new Bitcoin
                this.spawnBitcoin();
                
                // Increase speed
                this.speed = Math.max(200, this.speed * 0.98);
                this.updateSpeed();
                
                // Flash effect
                this.flash = true;
            },
            
            draw: function() {
                // Clear canvas
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw maze walls
                ctx.strokeStyle = '#374151';
                ctx.lineWidth = 2;
                ctx.beginPath();
                this.walls.forEach(wall => {
                    const x = wall.x * CELL_SIZE;
                    const y = wall.y * CELL_SIZE;
                    ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
                });
                ctx.stroke();
                
                // Draw player (Pac-Man)
                this.drawPlayer();
                
                // Draw target (Bitcoin)
                this.drawTarget();
                
                // Draw collected coins
                this.drawCoins();
                
                // Draw wall collisions effect
                if (this.flash) {
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.1)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    this.flash = false;
                }
            },
            
            drawPlayer: function() {
                const x = this.player.x * CELL_SIZE + CELL_SIZE / 2;
                const y = this.player.y * CELL_SIZE + CELL_SIZE / 2;
                const radius = CELL_SIZE / 2 - 2;
                
                // Pac-Man body
                ctx.beginPath();
                ctx.arc(x, y, radius, 0.2 * Math.PI, 1.8 * Math.PI);
                ctx.fillStyle = '#FFD700';
                ctx.fill();
                ctx.closePath();
                
                // Eyes
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(x - 3, y - radius / 3, 1, 0, Math.PI * 2);
                ctx.arc(x + 3, y - radius / 3, 1, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            },
            
            drawTarget: function() {
                const x = this.target.x * CELL_SIZE + CELL_SIZE / 2;
                const y = this.target.y * CELL_SIZE + CELL_SIZE / 2;
                const radius = CELL_SIZE / 2 - 2;
                
                // Bitcoin coin body
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD700';
                ctx.fill();
                ctx.closePath();
                
                // Bitcoin border
                ctx.strokeStyle = '#B8860B';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.closePath();
                
                // Bitcoin symbols
                ctx.fillStyle = '#000';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('₿', x, y + 1);
            },
            
            drawCoins: function() {
                // Draw previously collected coins as collected
            },
            
            updateScore: function() {
                document.getElementById('scoreDisplay').textContent = this.score.toLocaleString();
                document.getElementById('multiplierDisplay').textContent = 'x' + this.multiplier;
                document.getElementById('coinCounter').textContent = this.coinsCollected;
            },
            
            updateSpeed: function() {
                const percentage = ((1000 - this.speed) / 1000 * 100).toFixed(0);
                document.getElementById('speedFill').style.width = percentage + '%';
                document.getElementById('speedValue').textContent = percentage + '%';
                
                // Change color based on speed
                const speedFill = document.getElementById('speedFill');
                if (this.speed > 600) {
                    speedFill.style.background = 'linear-gradient(90deg, #10b981, #06d6a0)';
                } else if (this.speed > 400) {
                    speedFill.style.background = 'linear-gradient(90deg, #F7931A, #FFD700)';
                } else {
                    speedFill.style.background = 'linear-gradient(90deg, #ef4444, #dc2626)';
                }
            },
            
            restart: function() {
                document.getElementById('gameOver').style.display = 'none';
                this.init();
            }
        };
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    game.movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                    game.movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                    game.movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                    game.movePlayer(1, 0);
                    break;
            }
        });
        
        // Game loop
        function gameLoop(timestamp) {
            const deltaTime = timestamp - game.lastTime;
            game.lastTime = timestamp;
            
            game.update(deltaTime);
            game.draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Initialize and start game
        game.init();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
