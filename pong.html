<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Pong | ₿ Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --btc: #F7931A;
  --btc-glow: rgba(247,147,26,0.55);
  --eth: #627EEA;
  --xrp: #00AAE4;
  --doge: #C2A633;
  --sol: #9945FF;
  --pepe: #00BB44;
  --gold: #FFD700;
  --green: #00ff88;
  --red: #ff3355;
  --cyan: #00ffff;
  --bg: #060610;
  --panel: rgba(8,8,24,0.88);
  --border: rgba(247,147,26,0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
}

/* SCANLINES */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* NAV */
.nav {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 1.2rem;
  color: var(--btc);
  text-decoration: none;
  letter-spacing: 2px;
  text-shadow: 0 0 12px var(--btc-glow);
}

.nav-links {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
}

.nav-links a {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  color: #6b7280;
  text-decoration: none;
  letter-spacing: 1px;
  transition: color 0.2s;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--btc);
  text-shadow: 0 0 8px var(--btc-glow);
}

/* PAGE LAYOUT */
.page {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 20px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

/* CANVAS WRAPPER */
.canvas-wrap {
  position: relative;
  border-radius: 6px;
  box-shadow:
    0 0 0 2px var(--btc),
    0 0 30px var(--btc-glow),
    0 0 60px rgba(247,147,26,0.2);
}

#gameCanvas {
  display: block;
  border-radius: 6px;
  background: var(--bg);
  cursor: none;
}

/* OVERLAY BASE */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(6,6,16,0.92);
  border-radius: 6px;
  z-index: 10;
  gap: 16px;
  padding: 30px;
}

.overlay h1 {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(2rem, 6vw, 3.2rem);
  background: linear-gradient(135deg, var(--btc), var(--gold), var(--btc));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  letter-spacing: 4px;
  text-shadow: none;
  filter: drop-shadow(0 0 18px var(--btc-glow));
  line-height: 1.1;
}

.overlay .sub {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  color: var(--gold);
  letter-spacing: 3px;
}

.overlay .desc {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.05rem;
  color: #9ca3af;
  text-align: center;
  letter-spacing: 1px;
}

.overlay .best {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 2px;
}

.blink {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  color: var(--btc);
  letter-spacing: 2px;
  animation: blink 1.1s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* GAMEOVER OVERLAY */
.overlay .result-icon { font-size: 3.5rem; }
.overlay .result-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(1.3rem, 4vw, 2rem);
  text-align: center;
  letter-spacing: 3px;
}
.overlay .result-score {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.4rem;
  color: var(--gold);
  letter-spacing: 4px;
}
.overlay .streak {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  color: var(--green);
  font-weight: 700;
  letter-spacing: 2px;
}

.btn {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 2px;
  padding: 12px 32px;
  border: 2px solid var(--btc);
  background: transparent;
  color: var(--btc);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 6px;
}
.btn:hover {
  background: var(--btc);
  color: var(--bg);
  box-shadow: 0 0 20px var(--btc-glow);
}

/* HUD */
.hud {
  display: flex;
  gap: 28px;
  justify-content: center;
  flex-wrap: wrap;
  width: 100%;
}

.hud-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 20px;
  min-width: 100px;
}

.hud-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 2px;
  color: #6b7280;
  text-transform: uppercase;
}

.hud-value {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 1.4rem;
}

.hud-value.btc  { color: var(--btc); text-shadow: 0 0 10px var(--btc-glow); }
.hud-value.eth  { color: var(--eth); text-shadow: 0 0 10px rgba(98,126,234,0.5); }
.hud-value.rally{ color: var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.4); }
.hud-value.hi   { color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.4); }

/* MOBILE CONTROLS */
.mobile-controls {
  display: none;
  gap: 16px;
  justify-content: center;
}

.mob-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.4rem;
  font-weight: 900;
  width: 60px;
  height: 60px;
  border: 2px solid var(--btc);
  background: var(--panel);
  color: var(--btc);
  border-radius: 8px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.mob-btn:active {
  background: rgba(247,147,26,0.2);
}

@media (max-width: 840px) {
  #gameCanvas {
    width: 100%;
    height: auto;
  }
  .mobile-controls { display: flex; }
}
</style>
</head>
<script src="auth.js"></script>

<nav class="nav">
  <a class="nav-logo" href="index.html">₿ ARCADE</a>
  <div class="nav-links">
    <a href="pacman.html">Pac-Man</a>
    <a href="snake.html">Snake</a>

<div class="page">
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <!-- INTRO OVERLAY -->
    <div class="overlay" id="introOverlay">
      <h1>BITCOIN<br>PONG</h1>
      <div class="sub">₿ YOU &nbsp; vs &nbsp; Ξ ETH</div>
      <div class="desc">Bounce the BTC coin past the shitcoin AI</div>
      <div class="best" id="introBest">BEST STREAK: 0</div>
      <div class="blink">▶ CLICK OR PRESS ANY KEY TO START ◀</div>
    </div>

    <!-- GAMEOVER OVERLAY -->
    <div class="overlay" id="gameoverOverlay" style="display:none;">
      <div class="result-icon" id="goIcon">🏆</div>
      <div class="result-title" id="goTitle">YOU WIN! BITCOIN PREVAILS!</div>
      <div class="result-score" id="goScore">7 : 3</div>
      <div class="streak" id="goStreak">BEST STREAK: 0</div>
      <button class="btn" id="playAgainBtn">PLAY AGAIN</button>
    </div>
  </div>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">₿ Score</div>
      <div class="hud-value btc" id="hudBtc">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Ξ ETH Score</div>
      <div class="hud-value eth" id="hudEth">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Rally</div>
      <div class="hud-value rally" id="hudRally">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Hi-Streak</div>
      <div class="hud-value hi" id="hudHi">0</div>
    </div>
  </div>

  <div class="mobile-controls">
    <button class="mob-btn" id="mobUp">▲</button>
    <button class="mob-btn" id="mobDown">▼</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const W = 800, H = 500;
  const WIN_SCORE = 7;
  const PADDLE_W = 14, PADDLE_H = 90;
  const BALL_R = 12;
  const PLAYER_X = 20;
  const AI_X = 766;
  const AI_SPEED = 4.5;
  const BALL_SPEED_INIT = 5;
  const BALL_SPEED_MAX = 14;
  const BALL_SPEED_INC = 0.4;

  // Colors
  const C_BTC  = '#F7931A';
  const C_GOLD = '#FFD700';
  const C_ETH  = '#627EEA';
  const C_BG   = '#060610';
  const C_GREEN = '#00ff88';
  const C_RED   = '#ff3355';

  // Game state
  let state = 'intro'; // intro | playing | paused | gameover
  let playerScore = 0, aiScore = 0;
  let rally = 0, maxRally = 0;
  let bestStreak = Auth.getScore('btc_pong_hs');
  let flashTimer = 0;
  let pauseTimer = 0;
  let pauseDir = 1; // 1 = toward player, -1 = toward AI
  let animId = null;

  // Particles
  let particles = [];

  // Ball trail
  let trail = [];

  // Paddle
  const player = { x: PLAYER_X, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, score: 0 };
  const ai     = { x: AI_X,    y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, score: 0 };

  // Ball
  const ball = { x: W/2, y: H/2, vx: 0, vy: 0, speed: BALL_SPEED_INIT, spin: 0 };

  // Input
  const keys = {};
  let mouseY = null;
  let touchY = null;
  let mobUpHeld = false, mobDownHeld = false;

  // ─── UTILS ────────────────────────────────────────────────────────────────

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function randBetween(a, b) { return a + Math.random() * (b - a); }

  function loadBest() {
    bestStreak = Auth.getScore('btc_pong_hs');
  }

  function saveBest(v) {
    if (v > bestStreak) {
      bestStreak = v;
      Auth.saveScore('btc_pong_hs', v);
    }
  }

  function updateHUD() {
    document.getElementById('hudBtc').textContent   = playerScore;
    document.getElementById('hudEth').textContent   = aiScore;
    document.getElementById('hudRally').textContent = rally;
    document.getElementById('hudHi').textContent    = bestStreak;
  }

  // ─── BALL LAUNCH ──────────────────────────────────────────────────────────

  function resetBall(towardPlayer) {
    ball.x = W / 2;
    ball.y = H / 2;
    ball.speed = BALL_SPEED_INIT;
    // towardPlayer true → ball goes left
    const dir = towardPlayer ? -1 : 1;
    const angle = randBetween(Math.PI / 6, Math.PI / 4) * (Math.random() < 0.5 ? 1 : -1);
    ball.vx = dir * Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
    trail = [];
  }

  // ─── PARTICLES ────────────────────────────────────────────────────────────

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = randBetween(2, 8);
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: randBetween(0.015, 0.04),
        size: randBetween(2, 6),
        color
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.vx *= 0.97;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ─── DRAWING ──────────────────────────────────────────────────────────────

  function drawBackground() {
    ctx.fillStyle = C_BG;
    ctx.fillRect(0, 0, W, H);

    // Flash effect
    if (flashTimer > 0) {
      const alpha = flashTimer / 12 * 0.35;
      ctx.fillStyle = `rgba(247,147,26,${alpha})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Center energy field
    const fieldX = W/2;
    ctx.save();
    // Pulsing center line segments
    const pulse = 0.5 + 0.5*Math.sin(Date.now()*0.003);
    for(let y=0; y<H; y+=20) {
      const segAlpha = 0.08 + pulse*0.12;
      const segW = 2 + pulse*2;
      ctx.fillStyle = `rgba(247,147,26,${segAlpha})`;
      ctx.fillRect(fieldX - segW/2, y+2, segW, 14);
    }
    // Glow line
    const glow = ctx.createLinearGradient(fieldX-20, 0, fieldX+20, 0);
    glow.addColorStop(0, 'transparent');
    glow.addColorStop(0.5, `rgba(247,147,26,${0.06+pulse*0.06})`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(fieldX-20, 0, 40, H);
    ctx.restore();
  }

  function drawScore() {
    ctx.textAlign = 'center';
    ctx.font = '900 44px Orbitron, monospace';
    ctx.fillStyle = 'rgba(255,215,0,0.12)';
    ctx.fillText(playerScore, W/2 - 100, 60);
    ctx.fillText(aiScore, W/2 + 100, 60);

    ctx.font = '700 28px Orbitron, monospace';
    ctx.fillStyle = C_GOLD;
    ctx.shadowColor = C_GOLD;
    ctx.shadowBlur = 24;
    ctx.fillText(playerScore, W/2 - 100, 60);
    ctx.shadowBlur = 0;
    ctx.fillStyle = C_ETH;
    ctx.shadowColor = C_ETH;
    ctx.shadowBlur = 24;
    ctx.fillText(aiScore, W/2 + 100, 60);
    ctx.shadowBlur = 0;

    // Label
    ctx.font = '700 13px Orbitron, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('₿ YOU', W/2 - 100, 78);
    ctx.fillText('ETH Ξ', W/2 + 100, 78);

    // Colon
    ctx.font = '700 28px Orbitron, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText(':', W/2, 60);
  }

  function drawPaddle(p, color, glowColor, symbol) {
    ctx.save();
    // Glow
    ctx.shadowBlur = 20;
    ctx.shadowColor = glowColor;

    // Gradient
    const grad = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y + p.h);
    grad.addColorStop(0, color);
    grad.addColorStop(0.5, lightenHex(color, 40));
    grad.addColorStop(1, color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, p.w, p.h, 4);
    ctx.fill();

    // Symbol
    ctx.shadowBlur = 0;
    ctx.font = '700 16px Rajdhani, sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbol, p.x + p.w / 2, p.y + p.h / 2);

    ctx.restore();
  }

  function lightenHex(hex, amount) {
    const n = parseInt(hex.replace('#', ''), 16);
    const r = clamp(((n >> 16) & 0xff) + amount, 0, 255);
    const g = clamp(((n >> 8)  & 0xff) + amount, 0, 255);
    const b = clamp((n & 0xff)         + amount, 0, 255);
    return `rgb(${r},${g},${b})`;
  }

  function drawBall() {
    // Trail
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const alpha = (i / trail.length) * 0.35;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = C_BTC;
      ctx.beginPath();
      ctx.arc(t.x, t.y, BALL_R * (0.5 + 0.5 * i / trail.length), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Comet tail with additive composite
    if (trail && trail.length > 1) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      trail.forEach((pos, i) => {
        const t = i / trail.length;
        const r = BALL_R * t * 0.9;
        const alpha = t * 0.4;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, Math.max(1, r), 0, Math.PI*2);
        ctx.fillStyle = `rgba(247,147,26,${alpha})`;
        ctx.fill();
      });
      ctx.restore();
    }

    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(ball.spin);

    // Outer glow
    ctx.shadowBlur = 24;
    ctx.shadowColor = 'rgba(247,147,26,0.8)';

    // Coin gradient
    const grad = ctx.createRadialGradient(-3, -3, 1, 0, 0, BALL_R);
    grad.addColorStop(0, '#FFE87C');
    grad.addColorStop(0.5, C_GOLD);
    grad.addColorStop(1, C_BTC);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, BALL_R, 0, Math.PI * 2);
    ctx.fill();

    // Rim
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(247,147,26,0.9)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // ₿ symbol
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.font = `900 ${BALL_R * 1.2}px Orbitron, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('₿', 0, 1);

    ctx.restore();

    // Specular rim highlight at top-left
    ctx.save();
    const rimGrad = ctx.createRadialGradient(
      ball.x - BALL_R*0.3, ball.y - BALL_R*0.3, 0,
      ball.x, ball.y, BALL_R
    );
    rimGrad.addColorStop(0, 'rgba(255,255,220,0.45)');
    rimGrad.addColorStop(0.5, 'rgba(255,200,100,0.15)');
    rimGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = rimGrad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawRallyBadge() {
    if (rally < 3) return;
    const label = `RALLY ×${rally}`;
    ctx.font = '700 11px Orbitron, monospace';
    ctx.textAlign = 'center';
    const tw = ctx.measureText(label).width + 16;
    const bx = W/2, by = H - 28;
    ctx.fillStyle = 'rgba(0,255,136,0.12)';
    ctx.beginPath();
    ctx.roundRect(bx - tw/2, by - 10, tw, 22, 4);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,255,136,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = C_GREEN;
    ctx.fillText(label, bx, by + 2);
  }

  // ─── GAME LOGIC ──────────────────────────────────────────────────────────

  function moveBall() {
    // Trail
    trail.push({ x: ball.x, y: ball.y });
    if (trail.length > 10) trail.shift();

    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.spin += 0.06 * Math.sign(ball.vx);

    // Wall bounce top/bottom
    if (ball.y - BALL_R <= 0) {
      ball.y = BALL_R;
      ball.vy = Math.abs(ball.vy);
    }
    if (ball.y + BALL_R >= H) {
      ball.y = H - BALL_R;
      ball.vy = -Math.abs(ball.vy);
    }

    // Player paddle collision
    if (ball.vx < 0 &&
        ball.x - BALL_R <= player.x + player.w &&
        ball.x + BALL_R >= player.x &&
        ball.y >= player.y - BALL_R &&
        ball.y <= player.y + player.h + BALL_R) {

      ball.x = player.x + player.w + BALL_R;
      const relHit = (ball.y - (player.y + player.h / 2)) / (player.h / 2);
      const bounceAngle = relHit * (Math.PI / 3.2);
      ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_SPEED_MAX);
      ball.vx =  Math.cos(bounceAngle) * ball.speed;
      ball.vy =  Math.sin(bounceAngle) * ball.speed;
      // Clamp vertical
      const maxVY = ball.speed * 0.85;
      ball.vy = clamp(ball.vy, -maxVY, maxVY);
      rally++;
      updateHUD();
    }

    // AI paddle collision
    if (ball.vx > 0 &&
        ball.x + BALL_R >= ai.x &&
        ball.x - BALL_R <= ai.x + ai.w &&
        ball.y >= ai.y - BALL_R &&
        ball.y <= ai.y + ai.h + BALL_R) {

      ball.x = ai.x - BALL_R;
      const relHit = (ball.y - (ai.y + ai.h / 2)) / (ai.h / 2);
      const bounceAngle = relHit * (Math.PI / 3.2);
      ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_SPEED_MAX);
      ball.vx = -Math.cos(bounceAngle) * ball.speed;
      ball.vy =  Math.sin(bounceAngle) * ball.speed;
      const maxVY = ball.speed * 0.85;
      ball.vy = clamp(ball.vy, -maxVY, maxVY);
      rally++;
      updateHUD();
    }

    // Score: ball exits left
    if (ball.x + BALL_R < 0) {
      aiScore++;
      maxRally = Math.max(maxRally, rally);
      rally = 0;
      spawnParticles(W/2, H/2, C_ETH, 40);
      flashTimer = 12;
      updateHUD();
      checkWin();
      if (state === 'playing') {
        state = 'paused';
        pauseTimer = 60; // 1s at 60fps
        pauseDir = true; // toward player (just scored on by AI)
      }
    }

    // Score: ball exits right
    if (ball.x - BALL_R > W) {
      playerScore++;
      maxRally = Math.max(maxRally, rally);
      rally = 0;
      spawnParticles(W/2, H/2, C_GOLD, 60);
      flashTimer = 12;
      updateHUD();
      saveBest(playerScore);
      checkWin();
      if (state === 'playing') {
        state = 'paused';
        pauseTimer = 60;
        pauseDir = false; // toward AI (player just scored)
      }
    }
  }

  function checkWin() {
    if (playerScore >= WIN_SCORE || aiScore >= WIN_SCORE) {
      state = 'gameover';
      showGameover();
    }
  }

  function moveAI() {
    const target = ball.y - ai.h / 2;
    // Small random jitter to be beatable
    const jitter = (Math.random() - 0.5) * 6;
    const diff = target + jitter - ai.y;
    const move = clamp(diff, -AI_SPEED, AI_SPEED);
    ai.y += move;
    ai.y = clamp(ai.y, 0, H - ai.h);
  }

  function movePlayer() {
    const usingKeys = keys['ArrowUp'] || keys['ArrowDown'] || keys['w'] || keys['s'] || mobUpHeld || mobDownHeld;
    // Touch has highest priority
    if (touchY !== null) {
      player.y = clamp(touchY - player.h / 2, 0, H - player.h);
    // Mouse only if no keys pressed and mouse has moved
    } else if (mouseY !== null && !usingKeys) {
      player.y = clamp(mouseY - player.h / 2, 0, H - player.h);
    }
    // Arrow keys always work
    if (keys['ArrowUp']   || keys['w'] || mobUpHeld)   player.y -= 8;
    if (keys['ArrowDown'] || keys['s'] || mobDownHeld) player.y += 8;
    player.y = clamp(player.y, 0, H - player.h);
  }

  // ─── OVERLAY MANAGEMENT ──────────────────────────────────────────────────

  function showIntro() {
    loadBest();
    document.getElementById('introBest').textContent = `BEST STREAK: ${bestStreak}`;
    document.getElementById('introOverlay').style.display = 'flex';
    document.getElementById('gameoverOverlay').style.display = 'none';
  }

  function hideIntro() {
    document.getElementById('introOverlay').style.display = 'none';
  }

  function showGameover() {
    const won = playerScore >= WIN_SCORE;
    document.getElementById('goIcon').textContent  = won ? '🏆' : '💀';
    document.getElementById('goTitle').textContent = won
      ? 'YOU WIN! BITCOIN PREVAILS!'
      : 'ETH WINS! REKT!';
    document.getElementById('goTitle').style.color = won ? C_GOLD : C_RED;
    document.getElementById('goScore').textContent = `${playerScore} : ${aiScore}`;
    document.getElementById('goStreak').textContent = `BEST STREAK: ${bestStreak}`;
    document.getElementById('gameoverOverlay').style.display = 'flex';
  }

  function startGame() {
    playerScore = 0; aiScore = 0;
    rally = 0; maxRally = 0;
    particles = [];
    trail = [];
    player.y = H/2 - PADDLE_H/2;
    ai.y = H/2 - PADDLE_H/2;
    flashTimer = 0;
    hideIntro();
    document.getElementById('gameoverOverlay').style.display = 'none';
    state = 'paused';
    pauseTimer = 60;
    pauseDir = true;
    resetBall(pauseDir);
    updateHUD();
  }

  // ─── MAIN LOOP ────────────────────────────────────────────────────────────

  function loop() {
    animId = requestAnimationFrame(loop);

    drawBackground();
    drawScore();
    drawParticles();

    if (state === 'playing') {
      moveBall();
      movePlayer();
      moveAI();
      if (flashTimer > 0) flashTimer--;
      updateParticles();
    }

    if (state === 'paused') {
      movePlayer();
      if (flashTimer > 0) flashTimer--;
      updateParticles();
      pauseTimer--;
      if (pauseTimer <= 0) {
        state = 'playing';
        resetBall(pauseDir);
      } else {
        // Countdown display
        const sec = Math.ceil(pauseTimer / 60);
        ctx.font = '900 64px Orbitron, monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(247,147,26,${0.4 + 0.6 * (pauseTimer % 20) / 20})`;
        ctx.fillText(sec, W/2, H/2 + 24);
      }
    }

    drawPaddle(player, C_GOLD,  'rgba(247,147,26,0.7)', '₿');
    drawPaddle(ai,    C_ETH,   'rgba(98,126,234,0.7)',  'Ξ');
    drawBall();
    drawRallyBadge();

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }

  // ─── INPUT ────────────────────────────────────────────────────────────────

  window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (state === 'intro') { startGame(); }
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    mouseY = (e.clientY - rect.top) * scaleY;
    touchY = null;
  });

  canvas.addEventListener('click', () => {
    if (state === 'intro') startGame();
  });

  // Tap intro overlay to start (overlay sits on top of canvas on mobile)
  document.getElementById('introOverlay').addEventListener('click', () => { if(state==='intro') startGame(); });
  document.getElementById('introOverlay').addEventListener('touchstart', (e) => { e.preventDefault(); if(state==='intro') startGame(); }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    touchY = (e.touches[0].clientY - rect.top) * scaleY;
  }, { passive: false });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state === 'intro') { startGame(); return; }
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    touchY = (e.touches[0].clientY - rect.top) * scaleY;
  }, { passive: false });

  canvas.addEventListener('touchend', () => { touchY = null; });

  // Mobile buttons
  const mobUp   = document.getElementById('mobUp');
  const mobDown = document.getElementById('mobDown');
  mobUp.addEventListener('touchstart',   e => { e.preventDefault(); mobUpHeld = true; }, { passive: false });
  mobUp.addEventListener('touchend',     ()  => { mobUpHeld = false; });
  mobDown.addEventListener('touchstart', e => { e.preventDefault(); mobDownHeld = true; }, { passive: false });
  mobDown.addEventListener('touchend',   ()  => { mobDownHeld = false; });
  mobUp.addEventListener('mousedown',    ()  => { mobUpHeld = true; });
  mobUp.addEventListener('mouseup',      ()  => { mobUpHeld = false; });
  mobDown.addEventListener('mousedown',  ()  => { mobDownHeld = true; });
  mobDown.addEventListener('mouseup',    ()  => { mobDownHeld = false; });

  document.getElementById('playAgainBtn').addEventListener('click', startGame);

  // ─── INIT ─────────────────────────────────────────────────────────────────

  // Polyfill roundRect for older browsers
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      r = Math.min(r, w/2, h/2);
      this.beginPath();
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.arcTo(x + w, y, x + w, y + r, r);
      this.lineTo(x + w, y + h - r);
      this.arcTo(x + w, y + h, x + w - r, y + h, r);
      this.lineTo(x + r, y + h);
      this.arcTo(x, y + h, x, y + h - r, r);
      this.lineTo(x, y + r);
      this.arcTo(x, y, x + r, y, r);
      this.closePath();
    };
  }

  showIntro();
  resetBall(true);
  updateHUD();
  loop();

})();
</script>
</body>
</html>
