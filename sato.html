<style>
:root{
  --btc:#F7931A;--btc-glow:rgba(247,147,26,0.55);

  --green:#00ff88;--gold:#FFD700;--red:#ff3355;

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);min-height:100vh;color:#f0f0f0;
  display:flex;flex-direction:column;align-items:center;overflow-x:hidden;touch-action:manipulation;}
.scanlines{position:fixed;inset:0;z-index:300;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);}
.nav{width:100%;max-width:900px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);position:relative;z-index:10;}
.nav-logo{font-family:'Orbitron',monospace;font-size:1rem;color:var(--btc);text-decoration:none;letter-spacing:.06em;text-shadow:0 0 12px var(--btc-glow);}
.nav-links{display:flex;gap:12px;flex-wrap:wrap;}
.nav-links a{color:#6b7280;text-decoration:none;font-size:.72rem;font-family:'Orbitron',monospace;letter-spacing:.06em;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--btc);}
.hdr{text-align:center;padding:6px 0 4px;position:relative;z-index:1;}
.hdr h1{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;
  background:linear-gradient(90deg,#F7931A,#FFD700,#F7931A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;filter:drop-shadow(0 0 12px var(--btc-glow));}
.hdr p{color:#4b5563;font-size:.75rem;margin-top:2px;}
/* HUD */
.hud{display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:800px;padding:4px 8px;
  font-family:'Press Start 2P',monospace;font-size:8px;color:var(--btc);
  background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:6px;
  margin-bottom:4px;position:relative;z-index:1;}
.hud span{color:#aaa;}
.hud span b{color:var(--btc);}
/* Game canvas wrapper */
.cwrap{width:min(800px,100vw);position:relative;z-index:1;
  border:2px solid var(--border);border-radius:4px;
  box-shadow:0 0 40px var(--btc-glow);
  overflow:hidden;background:#0a0a1a;}
#g{display:block;width:100%;height:auto;image-rendering:pixelated;}
/* Touch controls */
.ctrl{width:100%;max-width:800px;display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px 10px;margin-top:4px;position:relative;z-index:1;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;}
@media(max-width:600px){
  .ctrl{position:fixed;bottom:0;left:0;right:0;border-radius:16px 16px 0 0;
    border-bottom:none;z-index:500;padding:8px 10px 14px;max-width:100%;
    box-shadow:0 -6px 30px rgba(0,0,0,.85);}
  body{padding-bottom:80px;}
}
.cbtn{background:rgba(247,147,26,.1);border:2px solid rgba(247,147,26,.4);border-radius:10px;
  width:56px;height:52px;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:var(--btc);touch-action:manipulation;user-select:none;
  -webkit-tap-highlight-color:transparent;transition:background .1s;}
.cbtn:active,.cbtn.pressed{background:rgba(247,147,26,.4);}
.cbtn.jump{background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.4);color:var(--green);width:64px;height:64px;font-size:1.6rem;}
.dpad{display:flex;gap:6px;}

.overlay{position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at center,#0d0820 0%,#060610 70%);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  gap:16px;padding:20px;}
.overlay.h{opacity:0;pointer-events:none;}
.ov-title{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,5vw,2.4rem);font-weight:900;
  background:linear-gradient(90deg,#F7931A,#FFD700,#F7931A);-webkit-background-clip:text;

.ov-btn{font-family:'Orbitron',monospace;background:linear-gradient(135deg,#F7931A,#FFD700);

// ── STATE ──
const canvas=document.getElementById('g');
const ctx=canvas.getContext('2d');
let gs={};
let diff=2;
let hiScore=parseInt(localStorage.getItem('sato_hs')||'0');
document.getElementById('menuHi').textContent='BEST: '+hiScore.toLocaleString();
document.getElementById('hHi').textContent=hiScore.toLocaleString();

function initLevel(lvlIdx,lives,score){
  const levels=makeLevels(diff);
  const lv=levels[lvlIdx%levels.length];
  gs={
    lvlIdx,lvlCount:levels.length,
    level:JSON.parse(JSON.stringify(lv)),
    camX:0,
    p:{x:40,y:160,vx:0,vy:0,w:14,h:20,grounded:false,alive:true,facing:1,step:0,deadT:0},
    enemies:lv.enemies.map(e=>({...e,alive:true,vy:0,w:14,h:14})),
    coins:lv.coins.map(c=>({...c,alive:true,t:Math.random()*Math.PI*2})),
    particles:[],
    score:score||0,
    lives:lives!=null?lives:(diff===3?2:3),
    hiScore,
    phase:'play', // play|dead|win|gameover|cleared
    winT:0,diff,
    spd:diff===3?SPD*1.2:diff===1?SPD*0.8:SPD,
  };
}

function startGame(d){
  diff=d;
  document.getElementById('menu').classList.add('h');
  document.getElementById('goOv').classList.add('h');
  document.getElementById('winOv').classList.add('h');
  initLevel(0,null,0);
}
function continueGame(){
  document.getElementById('winOv').classList.add('h');
  initLevel(gs.lvlIdx+1,gs.lives,gs.score);
}
function showMenu(){
  document.getElementById('menu').classList.remove('h');
  document.getElementById('goOv').classList.add('h');
  document.getElementById('winOv').classList.add('h');
  hiScore=parseInt(localStorage.getItem('sato_hs')||'0');
  document.getElementById('menuHi').textContent='BEST: '+hiScore.toLocaleString();
}

// ── INPUT ──
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&gs.phase==='play') doJump();
  e.preventDefault && (e.code==='Space'||e.code.startsWith('Arrow')) && e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function btnTouch(id,flag){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[flag]=true;el.classList.add('pressed');if(flag==='jump')doJump();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[flag]=false;el.classList.remove('pressed');},{passive:false});
  el.addEventListener('mousedown',e=>{keys[flag]=true;if(flag==='jump')doJump();});
  el.addEventListener('mouseup',e=>{keys[flag]=false;});
}
btnTouch('btnL','left');
btnTouch('btnR','right');
btnTouch('btnJ','jump');

function doJump(){
  const p=gs.p;
  if(!p||!p.alive)return;
  if(p.grounded){p.vy=JV;p.grounded=false;snd('jump');}
}

// ── SOUND ──
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function snd(type){
  try{
    const ac=getAC();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    const t=ac.currentTime;
    if(type==='jump'){o.type='square';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+0.1);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);}
    else if(type==='coin'){o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(1760,t+0.08);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);}
    else if(type==='stomp'){o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+0.15);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);}
    else if(type==='die'){o.type='sawtooth';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(110,t+0.4);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);}
    else if(type==='win'){o.type='sine';[0,0.1,0.2,0.3].forEach((d,i)=>{o.frequency.setValueAtTime([523,659,784,1047][i],t+d);});g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);}
    o.start(t);o.stop(t+0.6);
  }catch(e){}
}

// ── PHYSICS HELPERS ──
function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function resolvePlayer(p,plats){
  p.grounded=false;
  // vertical
  p.y+=p.vy;
  for(const pl of plats){
    if(rectOverlap(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h)){
      if(p.vy>0){p.y=pl.y-p.h;p.vy=0;p.grounded=true;}
      else if(p.vy<0){p.y=pl.y+pl.h;p.vy=0;}
    }
  }
  // horizontal
  p.x+=p.vx;
  for(const pl of plats){
    if(rectOverlap(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h)){
      if(p.vx>0){p.x=pl.x-p.w;}
      else if(p.vx<0){p.x=pl.x+pl.w;}
      p.vx=0;
    }
  }
}

function spawnParticles(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    gs.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,col});
  }
}

// ── UPDATE ──
function update(){
  if(!gs||!gs.p)return;
  const p=gs.p,{level,enemies,coins,particles}=gs;

  if(gs.phase==='dead'){
    p.deadT=(p.deadT||0)+1;
    p.vy+=GRAV;p.y+=p.vy;p.x+=p.vx*0.95;
    if(p.deadT>90){
      gs.lives--;
      if(gs.lives<=0){
        gs.phase='gameover';
        document.getElementById('goOv').classList.remove('h');
        document.getElementById('goIcon').textContent='💀';
        document.getElementById('goTitle').textContent='GAME OVER';
        document.getElementById('goStat').textContent='SCORE: '+gs.score.toLocaleString()+'\nBEST: '+gs.hiScore.toLocaleString();
      } else {
        // respawn
        initLevel(gs.lvlIdx,gs.lives,gs.score);
      }
    }
    updateParticles(particles);
    return;
  }
  if(gs.phase==='win'){
    gs.winT=(gs.winT||0)+1;
    if(gs.winT===1){snd('win');}
    if(gs.winT>120){
      document.getElementById('winOv').classList.remove('h');
      document.getElementById('winStat').textContent='SCORE: '+gs.score.toLocaleString()+'\nLEVEL '+(gs.lvlIdx+1)+' CLEAR!';
      gs.phase='winwait';
    }
    updateParticles(particles);
    return;
  }
  if(gs.phase!=='play')return;

  // Move player
  const mv=gs.spd;
  if(keys['ArrowLeft']||keys['KeyA']||keys['left']){p.vx=-mv;p.facing=-1;}
  else if(keys['ArrowRight']||keys['KeyD']||keys['right']){p.vx=mv;p.facing=1;}
  else{p.vx*=0.7;}

  p.vy+=GRAV;
  if(p.vy>MFALL)p.vy=MFALL;

  resolvePlayer(p,level.platforms);
  p.step=(p.step||0)+(Math.abs(p.vx)>0.2?1:0);

  // Clamp to level bounds
  if(p.x<0)p.x=0;
  if(p.x+p.w>level.width)p.x=level.width-p.w;

  // Fall off screen -> die
  if(p.y>H+40){killPlayer();}

  // Camera
  const targetCam=p.x-W*0.35;
  gs.camX+=(targetCam-gs.camX)*0.12;
  gs.camX=Math.max(0,Math.min(gs.camX,level.width-W));

  // Coins
  for(const c of coins){
    if(!c.alive)continue;
    c.t+=0.08;
    if(rectOverlap(p.x,p.y,p.w,p.h,c.x-6,c.y-6,12,12)){
      c.alive=false;
      gs.score+=10;
      snd('coin');
      spawnParticles(c.x,c.y,'#F7931A',6);
    }
  }

  // Enemy AI + stomp
  for(const e of enemies){
    if(!e.alive)continue;
    e.vy=(e.vy||0)+GRAV;
    if(e.vy>MFALL)e.vy=MFALL;
    e.y+=e.vy;
    // resolve enemy vs platforms vertically
    let egrounded=false;
    for(const pl of level.platforms){
      if(rectOverlap(e.x,e.y,e.w,e.h,pl.x,pl.y,pl.w,pl.h)&&e.vy>=0){
        e.y=pl.y-e.h;e.vy=0;egrounded=true;
      }
    }
    // patrol
    e.x+=e.dir*e.spd;
    // turn at edges: if no platform beneath, turn
    let hasFloor=false;
    for(const pl of level.platforms){
      if(e.dir>0&&e.x+e.w+2>=pl.x&&e.x+e.w+2<=pl.x+pl.w&&Math.abs(e.y+e.h-pl.y)<4)hasFloor=true;
      if(e.dir<0&&e.x-2>=pl.x&&e.x-2<=pl.x+pl.w&&Math.abs(e.y+e.h-pl.y)<4)hasFloor=true;
    }
    if(!hasFloor&&egrounded)e.dir*=-1;
    // turn at level walls
    if(e.x<0){e.x=0;e.dir=1;}
    if(e.x+e.w>level.width){e.x=level.width-e.w;e.dir=-1;}
    // fall off screen
    if(e.y>H+40){e.alive=false;continue;}

    // Player vs enemy collision
    if(!p.alive||gs.phase!=='play')continue;
    if(rectOverlap(p.x,p.y,p.w,p.h,e.x,e.y,e.w,e.h)){
      // stomp: player falling, feet above enemy mid
      if(p.vy>0&&p.y+p.h<e.y+e.h*0.6){
        e.alive=false;
        p.vy=JV*0.5;
        gs.score+=50;
        snd('stomp');
        spawnParticles(e.x+e.w/2,e.y,'#ff3355',8);
      } else {
        killPlayer();
      }
    }
  }

  // Goal flag
  if(p.x+p.w>=level.goalX&&gs.phase==='play'){
    gs.phase='win';
    gs.winT=0;
    // save hi score
    if(gs.score>gs.hiScore){gs.hiScore=gs.score;localStorage.setItem('sato_hs',gs.score);}
    spawnParticles(level.goalX,120,'#FFD700',30);
  }

  // Particles
  updateParticles(particles);

  // HUD
  updateHUD();
}

function killPlayer(){
  const p=gs.p;
  if(!p.alive||gs.phase==='dead')return;
  p.alive=false;
  p.vy=-7;
  p.vx=p.facing*1;
  p.deadT=0;
  gs.phase='dead';
  snd('die');
  spawnParticles(p.x+p.w/2,p.y,'#ff3355',12);
}

function updateParticles(particles){
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;
    pt.life-=0.03;
    if(pt.life<=0)particles.splice(i,1);
  }
}

function updateHUD(){
  document.getElementById('hScore').textContent=gs.score.toLocaleString();
  document.getElementById('hLvl').textContent=gs.lvlIdx+1;
  document.getElementById('hHi').textContent=gs.hiScore.toLocaleString();
  // lives hearts
  let h='';for(let i=0;i<gs.lives;i++)h+='♥ ';
  document.getElementById('hLives').textContent=h.trim()||'☠';
}

// ── RENDER ──
function drawBackground(lv){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,lv.bgTop);g.addColorStop(1,lv.bgBot);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // stars
  ctx.fillStyle='rgba(255,255,255,0.4)';
  const seed=gs.lvlIdx*1234;
  for(let i=0;i<60;i++){
    const sx=((seed*i*137+i*91)%1000)/1000*W;
    const sy=((seed*i*73+i*53)%1000)/1000*H*0.75;
    ctx.fillRect(Math.floor(sx),Math.floor(sy),1,1);
  }
}

function drawPlatform(pl,cx){
  const x=pl.x-cx,y=pl.y,w=pl.w,h=pl.h;
  if(x+w<0||x>W)return;
  // main fill
  ctx.fillStyle='#1a1a3a';
  ctx.fillRect(x,y,w,h);
  // top edge highlight
  ctx.fillStyle='#F7931A';
  ctx.fillRect(x,y,w,2);
  // side bricks
  ctx.fillStyle='#2a2a4a';
  const bw=16;
  for(let bx=0;bx<w;bx+=bw){
    ctx.strokeStyle='#0e0e2e';ctx.lineWidth=1;
    ctx.strokeRect(x+bx+0.5,y+2.5,Math.min(bw,w-bx)-1,h-3);
  }
  // Bitcoin symbols on some blocks
  ctx.fillStyle='rgba(247,147,26,0.15)';
  ctx.font='8px monospace';ctx.textAlign='center';
  for(let bx=8;bx<w;bx+=bw){
    if((pl.x+bx)%48<16)ctx.fillText('₿',x+bx,y+h/2+3);
  }
}

function drawCoin(c,cx){
  if(!c.alive)return;
  const x=c.x-cx,y=c.y+Math.sin(c.t)*2;
  if(x<-10||x>W+10)return;
  ctx.save();
  ctx.shadowColor='#F7931A';ctx.shadowBlur=6;
  // coin body
  ctx.fillStyle='#F7931A';
  ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.arc(x-1,y-1,3,0,Math.PI*2);ctx.fill();
  // ₿ symbol
  ctx.fillStyle='#1a0800';ctx.font='bold 5px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('₿',x,y);
  ctx.restore();
}

function drawEnemy(e,cx){
  if(!e.alive)return;
  const x=Math.floor(e.x-cx),y=Math.floor(e.y);
  if(x+e.w<0||x>W)return;
  const col=ECOL[e.type]||'#ff00ff';
  const nm=ENAMES[e.type]||'???';
  ctx.save();
  ctx.shadowColor=col;ctx.shadowBlur=8;
  // body
  ctx.fillStyle=col;
  ctx.fillRect(x,y+4,e.w,e.h-4);
  // head
  ctx.fillStyle=col;
  ctx.fillRect(x+2,y,e.w-4,8);
  // eyes
  ctx.fillStyle='#fff';
  ctx.fillRect(x+3,y+2,3,3);
  ctx.fillRect(x+e.w-6,y+2,3,3);
  ctx.fillStyle='#000';
  ctx.fillRect(x+(e.dir>0?4:3),y+3,2,2);
  ctx.fillRect(x+e.w+(e.dir>0?-5:-6),y+3,2,2);
  // label
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 5px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(nm,x+e.w/2,y+e.h/2+2);
  ctx.restore();
}

function drawPlayer(p,cx){
  const x=Math.floor(p.x-cx),y=Math.floor(p.y);
  const f=p.facing;
  ctx.save();
  if(!p.alive){
    ctx.globalAlpha=0.7;
    ctx.translate(x+p.w/2,y+p.h/2);
    ctx.rotate(Math.PI);
    ctx.translate(-p.w/2,-p.h/2);
  } else {
    ctx.translate(x,y);
  }
  // body - orange
  ctx.fillStyle='#F7931A';
  ctx.fillRect(0,p.h*0.35,p.w,p.h*0.65-4); // torso
  // legs with step animation
  const legOff=p.grounded?Math.sin(p.step*0.3)*2:0;
  ctx.fillStyle='#c26a00';
  ctx.fillRect(1,p.h-6+legOff,4,6);
  ctx.fillRect(p.w-5,p.h-6-legOff,4,6);
  // head
  ctx.fillStyle='#F7931A';
  ctx.fillRect(2,0,p.w-4,p.h*0.4);
  // bitcoin cap
  ctx.fillStyle='#FFD700';
  ctx.fillRect(1,-3,p.w-2,5);
  ctx.fillStyle='#F7931A';
  ctx.fillRect(f>0?p.w-3:-3,p.h*0.05,4,3); // cap brim
  // face
  ctx.fillStyle='#fff';
  const ex=f>0?p.w-7:3;
  ctx.fillRect(ex,p.h*0.1,4,4);
  ctx.fillStyle='#000';
  ctx.fillRect(ex+(f>0?1:1),p.h*0.1+1,2,2);
  // ₿ on body
  ctx.fillStyle='rgba(255,215,0,0.9)';ctx.font='bold 7px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('₿',p.w/2,p.h*0.62);
  ctx.restore();
}

function drawGoal(lv,cx){
  const gx=lv.goalX-cx;
  if(gx<-20||gx>W+20)return;
  // pole
  ctx.fillStyle='#FFD700';ctx.fillRect(gx-1,60,3,148);
  // flag
  ctx.fillStyle='#F7931A';ctx.beginPath();
  ctx.moveTo(gx+2,60);ctx.lineTo(gx+28,72);ctx.lineTo(gx+2,84);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.font='bold 9px monospace';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('₿',gx+8,72);
  // ground block
  ctx.fillStyle='#2a2a4a';ctx.fillRect(gx-6,208,14,32);
  ctx.fillStyle='#F7931A';ctx.fillRect(gx-6,208,14,2);
}

function drawParticles(cx){
  for(const pt of gs.particles){
    ctx.save();
    ctx.globalAlpha=pt.life;
    ctx.fillStyle=pt.col;
    ctx.fillRect(Math.floor(pt.x-cx),Math.floor(pt.y),3,3);
    ctx.restore();
  }
}

function render(){
  if(!gs||!gs.p||!gs.level)return;
  const{level,camX:cx,p,enemies,coins,particles}=gs;

  ctx.imageSmoothingEnabled=false;
  drawBackground(level);

  // platforms
  for(const pl of level.platforms)drawPlatform(pl,cx);

  // goal
  drawGoal(level,cx);

  // coins
  for(const c of coins)drawCoin(c,cx);

  // enemies
  for(const e of enemies)drawEnemy(e,cx);

  // player
  drawPlayer(p,cx);

  // particles
  drawParticles(cx);

  // phase overlays on canvas
  if(gs.phase==='win'||gs.phase==='winwait'){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFD700';ctx.font='bold 14px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#F7931A';ctx.shadowBlur=16;
    ctx.fillText('LEVEL CLEAR! ₿',W/2,H/2-10);
    ctx.font='8px monospace';ctx.fillStyle='#fff';ctx.shadowBlur=0;
    ctx.fillText('+'+gs.score+' SATS',W/2,H/2+8);
    ctx.restore();
  }
}

// ── GAME LOOP ──
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=ts-lastT;
  if(dt<14)return; // cap ~60fps — prevents 2× speed on 120Hz screens
  lastT=ts;
  if(gs&&gs.phase){
    update();
    render();
  }
}
requestAnimationFrame(loop);

</script>
